<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Thalinja | Senior Software Engineer</title>
    <meta name="description" content="Akshay Thalinja — Senior Software Engineer at Akaike Technologies.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --accent: #00ff66;
            --text-main: #ffffff;
            --text-dim: #888888;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Video Background with Overlay */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        video#bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.3);
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3ExternalGradient%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: -1;
        }

        /* Layout */
        main {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 4rem 10% 2rem 10%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Navigation Grid Style */
        nav {
            display: flex;
            gap: 2rem;
            margin-bottom: 6rem;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.3s ease;
            position: relative;
        }

        nav a:hover {
            color: var(--accent);
        }

        /* Hero Section */
        .hero {
            position: relative;
            margin-bottom: 8rem;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 10vw, 7rem);
            line-height: 0.9;
            margin-bottom: 1.5rem;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }

        .role-badge {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 0.5rem 1rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transform: skewX(-15deg);
        }

        .role-text {
            display: inline-block;
            margin-left: 1.5rem;
            font-size: 1.2rem;
            color: var(--text-dim);
            transform: skewX(0deg);
        }

        /* Blog Section */
        .blog-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 4rem;
            border-top: 1px solid var(--border);
            padding-top: 4rem;
        }

        .section-label {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 0.5rem;
            text-transform: uppercase;
        }

        #blog-container {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .blog-card {
            text-decoration: none;
            color: inherit;
            display: block;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            transition: transform 0.3s ease;
        }

        .blog-card:hover {
            transform: translateX(20px);
        }

        .blog-card h3 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 400;
        }

        .blog-card span {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding-top: 6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .brand {
            color: var(--text-main);
            font-weight: 700;
        }

        /* Utilities */
        .loading { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
        .error { color: #ff4444; }

        @media (max-width: 900px) {
            .blog-section { grid-template-columns: 1fr; gap: 2rem; }
            h1 { font-size: 4rem; }
            nav { flex-wrap: wrap; margin-bottom: 4rem; }
            main { padding: 2rem 5%; }
        }
    </style>
</head>
<body>

<div id="mandatory-bot-banner" style="background-color: #0b0f19; color: #e2e8f0; text-align: center; padding: 12px 40px 12px 16px; font-size: 14px; font-family: system-ui, -apple-system, sans-serif; position: relative; width: 100%; box-sizing: border-box; z-index: 10000; border-bottom: 1px solid #1e293b; display: flex; justify-content: center; align-items: center; min-height: 48px; line-height: 1.5;">
    <span style="max-width: 800px; margin: 0 auto;">
        The design and code of this website are automatically generated and updated weekly by an LLM. 
        <a href="/prompt.txt" style="color: #38bdf8; text-decoration: none; font-weight: 500; white-space: nowrap; margin-left: 4px;">Read the prompt &rarr;</a>
    </span>
    <button onclick="document.getElementById('mandatory-bot-banner').remove()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #94a3b8; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;" onmouseover="this.style.color='#fff';this.style.backgroundColor='#334155';" onmouseout="this.style.color='#94a3b8';this.style.backgroundColor='#1e293b';">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
</div>


    <div class="bg-container">
        <video id="bg-video" autoplay muted loop playsinline>
            <source src="static/bg.webm" type="video/webm">
        </video>
    </div>
    <div class="noise-overlay"></div>

    <main>
        <nav>
            <a href="https://github.com/akstspace" target="_blank">GitHub</a>
            <a href="https://in.linkedin.com/in/akshay-t-b18b13172" target="_blank">LinkedIn</a>
            <a href="https://blog.chaioverflow.com" target="_blank">Blog</a>
        </nav>

        <section class="hero">
            <h1>Akshay<br>Thalinja</h1>
            <div>
                <span class="role-badge">SR. ENGINEER</span>
                <span class="role-text">@ Akaike</span>
            </div>
        </section>

        <section class="blog-section">
            <div class="section-label">Latest Journal</div>
            <div id="blog-container">
                <div class="loading">Fetching stream from chaioverflow...</div>
            </div>
        </section>

        <footer>
            <div class="brand">chaioverflow</div>
            <div id="year-display"></div>
        </footer>
    </main>

    <script>
        // Dynamic Year
        document.getElementById('year-display').textContent = `© ${new Date().getFullYear()}`;

        // Fetch Blog Posts
        async function fetchPosts() {
            const container = document.getElementById('blog-container');
            const rssUrl = 'https://api.rss2json.com/v1/api.json?rss_url=https://blog.chaioverflow.com/rss/';
            
            try {
                const response = await fetch(rssUrl);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    container.innerHTML = '';
                    const posts = data.items.slice(0, 3);
                    
                    posts.forEach(post => {
                        const date = new Date(post.pubDate).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'short',
                            day: 'numeric'
                        });
                        
                        const postEl = document.createElement('a');
                        postEl.className = 'blog-card';
                        postEl.href = post.link;
                        postEl.target = '_blank';
                        postEl.innerHTML = `
                            <span>${date}</span>
                            <h3>${post.title}</h3>
                        `;
                        container.appendChild(postEl);
                    });
                } else {
                    throw new Error();
                }
            } catch (err) {
                container.innerHTML = `
                    <div class="error">
                        Unable to load mental logs. 
                        <br><br>
                        <a href="https://blog.chaioverflow.com" target="_blank" style="color: var(--accent)">Visit Blog Directly &rarr;</a>
                    </div>
                `;
            }
        }

        fetchPosts();
    </script>
</body>
</html>
