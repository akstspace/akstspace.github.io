<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Thalinja | Senior Software Engineer</title>
    <meta name="description" content="Akshay Thalinja — Senior Software Engineer at Akaike Technologies.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00ffaa;
            --accent-soft: rgba(0, 255, 170, 0.1);
            --text-main: #f0f0f0;
            --text-dim: #888888;
            --grid-size: 50px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Brutalist Background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--accent-soft) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-soft) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0.05;
            pointer-events: none;
            z-index: 100;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header Layout */
        header {
            margin-bottom: 6rem;
            position: relative;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3.5rem, 10vw, 8rem);
            font-weight: 800;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff 40%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .role-tag {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 0.5rem 1rem;
            font-weight: 700;
            font-size: 1.1rem;
            transform: skewX(-15deg);
        }

        .role-tag span {
            display: inline-block;
            transform: skewX(15deg);
        }

        /* Navigation */
        nav {
            margin-top: 3rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }

        .nav-link:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
            padding-bottom: 4px;
        }

        /* Blog Section */
        .blog-container {
            margin-top: 4rem;
            border-top: 1px solid var(--accent-soft);
            padding-top: 2rem;
        }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.3rem;
            color: var(--accent);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: var(--accent-soft);
        }

        #blog-posts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 0;
            background: var(--accent);
            transition: height 0.3s ease;
        }

        .post-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-5px);
            border-color: var(--accent-soft);
        }

        .post-card:hover::before {
            height: 100%;
        }

        .post-date {
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 1rem;
            font-family: monospace;
        }

        .post-title {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .loading, .error-msg {
            grid-column: 1 / -1;
            padding: 3rem;
            text-align: center;
            background: rgba(255,255,255,0.02);
            border: 1px dashed var(--accent-soft);
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 4rem 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--accent-soft);
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .brand-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        @media (max-width: 768px) {
            main { padding: 2rem 1.5rem; }
            h1 { font-size: 4rem; }
            nav { gap: 1rem; }
            .nav-link { font-size: 1rem; }
            footer { flex-direction: column; gap: 1rem; text-align: center; }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body>

<div id="mandatory-bot-banner" style="background-color: #0b0f19; color: #e2e8f0; text-align: center; padding: 12px 40px 12px 16px; font-size: 14px; font-family: system-ui, -apple-system, sans-serif; position: relative; width: 100%; box-sizing: border-box; z-index: 10000; border-bottom: 1px solid #1e293b; display: flex; justify-content: center; align-items: center; min-height: 48px; line-height: 1.5;">
    <span style="max-width: 800px; margin: 0 auto;">
        The design and code of this website are automatically generated and updated weekly by an LLM. 
        <a href="/prompt.txt" style="color: #38bdf8; text-decoration: none; font-weight: 500; white-space: nowrap; margin-left: 4px;">Read the prompt &rarr;</a>
    </span>
    <button onclick="document.getElementById('mandatory-bot-banner').remove()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #94a3b8; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;" onmouseover="this.style.color='#fff';this.style.backgroundColor='#334155';" onmouseout="this.style.color='#94a3b8';this.style.backgroundColor='#1e293b';">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
</div>

    <div class="bg-grid"></div>
    <div class="noise"></div>

    <main>
        <header class="reveal">
            <div class="role-tag"><span>Senior Software Engineer @ Akaike</span></div>
            <h1>Akshay<br>Thalinja</h1>
            
            <nav id="links">
                <a href="https://github.com/akstspace" target="_blank" class="nav-link" rel="noopener">GitHub ↗</a>
                <a href="https://in.linkedin.com/in/akshay-t-b18b13172" target="_blank" class="nav-link" rel="noopener">LinkedIn ↗</a>
                <a href="https://blog.chaioverflow.com" target="_blank" class="nav-link" rel="noopener">Blog ↗</a>
            </nav>
        </header>

        <section class="blog-container reveal" style="animation-delay: 0.2s;">
            <h2 class="section-title">Latest Thoughts</h2>
            <div id="blog-posts">
                <div class="loading">Fetching data stream...</div>
            </div>
        </section>

        <footer class="reveal" style="animation-delay: 0.4s;">
            <div class="brand-logo">chaioverflow</div>
            <div id="year-display"></div>
        </footer>
    </main>

    <script>
        // Dynamic Year
        document.getElementById('year-display').textContent = `© ${new Date().getFullYear()}`;

        // Fetch RSS feed
        const RSS_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https://blog.chaioverflow.com/rss/';
        const container = document.getElementById('blog-posts');

        async function fetchPosts() {
            try {
                const response = await fetch(RSS_URL);
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                
                if (data.status === 'ok' && data.items) {
                    container.innerHTML = '';
                    const posts = data.items.slice(0, 3);
                    
                    posts.forEach(post => {
                        const date = new Date(post.pubDate).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'short',
                            day: 'numeric'
                        });
                        
                        const card = document.createElement('a');
                        card.className = 'post-card';
                        card.href = post.link;
                        card.target = '_blank';
                        card.rel = 'noopener';
                        card.innerHTML = `
                            <div>
                                <div class="post-date">// ${date}</div>
                                <h3 class="post-title">${post.title}</h3>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    throw new Error('Invalid data format');
                }
            } catch (error) {
                console.error('Error fetching RSS:', error);
                container.innerHTML = `
                    <div class="error-msg">
                        <p>Stream unavailable. Visit the blog directly:</p>
                        <a href="https://blog.chaioverflow.com" target="_blank" class="nav-link" style="justify-content: center; margin-top: 1rem;">chaioverflow.com ↗</a>
                    </div>
                `;
            }
        }

        fetchPosts();

        // Mouse move effect for grid
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX / window.innerWidth) * 20;
            const moveY = (e.clientY / window.innerHeight) * 20;
            document.querySelector('.bg-grid').style.transform = `translate(${-moveX}px, ${-moveY}px)`;
        });
    </script>
</body>
</html>
