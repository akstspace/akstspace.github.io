<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Thalinja | Senior Software Engineer</title>
    <meta name="description" content="Akshay Thalinja — Senior Software Engineer at Akaike Technologies.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #00ffaa;
            --text-main: #ffffff;
            --text-dim: #88888b;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --font-display: 'Syne', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Abstract Background Elements */
        .glass-sphere {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 255, 170, 0.07) 0%, rgba(0, 0, 0, 0) 70%);
            top: -200px;
            right: -100px;
            z-index: -1;
            filter: blur(60px);
            animation: float 20s infinite alternate;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            opacity: 0.2;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-50px, 100px) scale(1.1); }
        }

        /* Layout */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        header {
            margin-bottom: 120px;
            position: relative;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
            border-radius: 4px;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 6rem);
            line-height: 0.9;
            margin-bottom: 10px;
            letter-spacing: -2px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .role-wrapper {
            overflow: hidden;
        }

        .role {
            font-family: var(--font-display);
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            color: var(--text-dim);
            font-weight: 300;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) both;
            animation-delay: 0.2s;
        }

        .role span {
            color: var(--text-main);
            position: relative;
        }

        /* Links */
        .nav-links {
            display: flex;
            gap: 30px;
            margin-top: 50px;
            animation: fadeIn 1.2s ease-out;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            transition: color 0.3s;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: width 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Blog Section */
        .blog-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 60px;
            margin-top: 100px;
            border-top: 1px solid var(--border);
            padding-top: 60px;
        }

        .section-label h2 {
            font-family: var(--font-display);
            font-size: 2rem;
            position: sticky;
            top: 40px;
        }

        .blog-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .blog-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: block;
            backdrop-filter: blur(10px);
        }

        .blog-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .blog-card h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: var(--text-main);
            line-height: 1.3;
        }

        .blog-card .date {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        .loading-pulse {
            height: 100px;
            background: var(--card-bg);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .loading-pulse::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        footer {
            margin-top: 150px;
            padding-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 30px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .brand-logo {
            font-family: var(--font-display);
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        @media (max-width: 850px) {
            .blog-section {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .section-label h2 {
                position: static;
            }
            main {
                padding: 40px 20px;
            }
            header {
                margin-bottom: 60px;
            }
            .nav-links {
                flex-wrap: wrap;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

<div id="mandatory-bot-banner" style="background-color: #0b0f19; color: #e2e8f0; text-align: center; padding: 12px 40px 12px 16px; font-size: 14px; font-family: system-ui, -apple-system, sans-serif; position: relative; width: 100%; box-sizing: border-box; z-index: 10000; border-bottom: 1px solid #1e293b; display: flex; justify-content: center; align-items: center; min-height: 48px; line-height: 1.5;">
    <span style="max-width: 800px; margin: 0 auto;">
        The design and code of this website are automatically generated and updated weekly by an LLM. 
        <a href="/prompt.txt" style="color: #38bdf8; text-decoration: none; font-weight: 500; white-space: nowrap; margin-left: 4px;">Read the prompt &rarr;</a>
    </span>
    <button onclick="document.getElementById('mandatory-bot-banner').remove()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #94a3b8; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;" onmouseover="this.style.color='#fff';this.style.backgroundColor='#334155';" onmouseout="this.style.color='#94a3b8';this.style.backgroundColor='#1e293b';">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
</div>


    <div class="glass-sphere"></div>
    <div class="grid-overlay"></div>

    <main>
        <header>
            <div class="badge">Systems & Software</div>
            <h1>Akshay<br>Thalinja</h1>
            <div class="role-wrapper">
                <div class="role">Senior Software Engineer @ <span>Akaike</span></div>
            </div>
            
            <nav class="nav-links">
                <a href="https://github.com/akstspace" target="_blank">GITHUB /</a>
                <a href="https://in.linkedin.com/in/akshay-t-b18b13172" target="_blank">LINKEDIN /</a>
                <a href="https://blog.chaioverflow.com" target="_blank">BLOG</a>
            </nav>
        </header>

        <section class="blog-section">
            <div class="section-label">
                <h2>LATEST WRITINGS</h2>
            </div>
            <div class="blog-feed" id="blog-feed">
                <!-- Fallback/Loading state -->
                <div class="loading-pulse"></div>
                <div class="loading-pulse"></div>
                <div class="loading-pulse"></div>
            </div>
        </section>

        <footer>
            <div class="brand-logo">chaioverflow</div>
            <div id="year-display"></div>
        </footer>
    </main>

    <script>
        // Update Year
        document.getElementById('year-display').textContent = `© ${new Date().getFullYear()}`;

        // Fetch Blog Posts
        async function fetchPosts() {
            const feedContainer = document.getElementById('blog-feed');
            const RSS_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https://blog.chaioverflow.com/rss/';
            
            try {
                const response = await fetch(RSS_URL);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    feedContainer.innerHTML = '';
                    const posts = data.items.slice(0, 3);
                    
                    posts.forEach(post => {
                        const date = new Date(post.pubDate).toLocaleDateString('en-US', {
                            month: 'short',
                            day: 'numeric',
                            year: 'numeric'
                        });
                        
                        const card = document.createElement('a');
                        card.className = 'blog-card';
                        card.href = post.link;
                        card.target = '_blank';
                        card.innerHTML = `
                            <span class="date">${date}</span>
                            <h3>${post.title}</h3>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                        `;
                        feedContainer.appendChild(card);
                    });
                } else {
                    throw new Error('API return not ok');
                }
            } catch (error) {
                console.error('Error fetching blog:', error);
                feedContainer.innerHTML = `
                    <div class="blog-card" style="border-style: dashed;">
                        <span class="date">Notice</span>
                        <h3>Unable to load recent posts.</h3>
                        <p style="color: var(--text-dim);">Visit my blog directly to see the latest content.</p>
                        <a href="https://blog.chaioverflow.com" target="_blank" style="color: var(--accent); margin-top: 10px; display: inline-block;">Go to chaioverflow.com →</a>
                    </div>
                `;
            }
        }

        fetchPosts();
    </script>
</body>
</html>
