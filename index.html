<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Thalinja | Senior Software Engineer</title>
    <meta name="description" content="Akshay Thalinja — Senior Software Engineer at Akaike Technologies.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00ffaa;
            --text: #ffffff;
            --text-dim: #888888;
            --card-bg: #141414;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Ambient Glow Background */
        .background-blob {
            position: fixed;
            top: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(0, 255, 170, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        header {
            margin-bottom: 5rem;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff 40%, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .role-tag {
            font-size: 1.25rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .role-tag::before {
            content: '';
            width: 40px;
            height: 1px;
            background: var(--accent);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 3rem 0;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text);
            padding: 1.5rem;
            border: 1px solid #222;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .nav-link:hover {
            border-color: var(--accent);
            background: rgba(0, 255, 170, 0.05);
            transform: translateY(-5px);
        }

        .blog-section {
            margin-top: 2rem;
        }

        .section-label {
            font-family: 'Syne', sans-serif;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            margin-bottom: 2rem;
            display: block;
        }

        #posts-container {
            display: grid;
            gap: 1.5rem;
        }

        .post-card {
            padding: 1.5rem;
            border-left: 2px solid #222;
            transition: border-color 0.3s;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .post-card:hover {
            border-left-color: var(--accent);
            background: linear-gradient(90deg, rgba(0, 255, 170, 0.03) 0%, transparent 100%);
        }

        .post-title {
            font-size: 1.4rem;
            font-weight: 500;
            color: #eee;
            margin-bottom: 0.5rem;
        }

        .post-date {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        footer {
            margin-top: 6rem;
            padding-top: 2rem;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .brand-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            color: var(--text);
            letter-spacing: 1px;
        }

        .loader {
            color: var(--text-dim);
            font-style: italic;
        }

        .error-msg {
            color: #ff5555;
            padding: 1rem;
            border: 1px dashed #ff5555;
        }

        @media (max-width: 768px) {
            main { padding: 2rem 1.5rem; }
            h1 { font-size: 3.5rem; }
            .links-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="mandatory-bot-banner" style="background-color: #0b0f19; color: #e2e8f0; text-align: center; padding: 12px 40px 12px 16px; font-size: 14px; font-family: system-ui, -apple-system, sans-serif; position: relative; width: 100%; box-sizing: border-box; z-index: 10000; border-bottom: 1px solid #1e293b; display: flex; justify-content: center; align-items: center; min-height: 48px; line-height: 1.5;">
    <span style="max-width: 800px; margin: 0 auto;">
        The design and code of this website are automatically generated and updated weekly by an LLM. 
        <a href="/prompt.txt" style="color: #38bdf8; text-decoration: none; font-weight: 500; white-space: nowrap; margin-left: 4px;">Read the prompt &rarr;</a>
    </span>
    <button onclick="document.getElementById('mandatory-bot-banner').remove()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #94a3b8; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;" onmouseover="this.style.color='#fff';this.style.backgroundColor='#334155';" onmouseout="this.style.color='#94a3b8';this.style.backgroundColor='#1e293b';">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
</div>

    <div class="background-blob"></div>
    
    <main>
        <header>
            <h1>Akshay<br>Thalinja</h1>
            <div class="role-tag">Senior Software Engineer @ Akaike</div>
        </header>

        <section class="links-grid">
            <a href="https://github.com/akstspace" target="_blank" class="nav-link">
                <span>GitHub</span>
                <span>→</span>
            </a>
            <a href="https://in.linkedin.com/in/akshay-t-b18b13172" target="_blank" class="nav-link">
                <span>LinkedIn</span>
                <span>→</span>
            </a>
            <a href="https://chaioverflow.substack.com" target="_blank" class="nav-link">
                <span>Blog</span>
                <span>→</span>
            </a>
        </section>

        <section class="blog-section">
            <span class="section-label">Latest from chaioverflow</span>
            <div id="posts-container">
                <div class="loader">Fetching latest insights...</div>
            </div>
        </section>

        <footer>
            <div class="brand-logo">chaioverflow</div>
            <div>&copy; <span id="year"></span></div>
        </footer>
    </main>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        async function fetchPosts() {
            const container = document.getElementById('posts-container');
            const rssUrl = 'https://api.rss2json.com/v1/api.json?rss_url=https://chaioverflow.substack.com/feed';

            try {
                const response = await fetch(rssUrl);
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                
                if (data.status === 'ok') {
                    container.innerHTML = '';
                    data.items.slice(0, 3).forEach(post => {
                        const date = new Date(post.pubDate).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'short',
                            day: 'numeric'
                        });
                        
                        const postHtml = `
                            <a href="${post.link}" target="_blank" class="post-card">
                                <div class="post-title">${post.title}</div>
                                <div class="post-date">${date}</div>
                            </a>
                        `;
                        container.innerHTML += postHtml;
                    });
                } else {
                    throw new Error();
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="error-msg">
                        Unable to load posts directly. 
                        <a href="https://chaioverflow.substack.com" target="_blank" style="color: var(--accent)">Visit the blog →</a>
                    </div>
                `;
            }
        }

        fetchPosts();
    </script>
</body>
</html>
