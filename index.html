<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Thalinja | Senior Software Engineer</title>
    <meta name="description" content="Akshay Thalinja — Senior Software Engineer at Akaike Technologies.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #00f0ff;
            --secondary: #ff007a;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Technical Grid Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
        }

        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            z-index: -1;
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(-100px, 100px); }
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 100px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            min-height: 90vh;
            align-items: center;
        }

        @media (max-width: 850px) {
            main { grid-template-columns: 1fr; padding-top: 60px; }
            .hero-content { order: 1; }
            .feed-section { order: 2; }
        }

        .hero-content h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            line-height: 1;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .hero-content h2 {
            font-size: 1.25rem;
            font-weight: 300;
            color: var(--accent);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .social-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-link {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.9rem;
            padding: 12px 24px;
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--glass);
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-link:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 240, 255, 0.1);
        }

        /* Blog Section */
        .feed-section {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 8px;
            position: relative;
        }

        .feed-section::before {
            content: 'LATEST_LOGS';
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--bg);
            padding: 0 10px;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.7rem;
            color: var(--secondary);
            letter-spacing: 2px;
        }

        #blog-feed {
            margin-top: 20px;
        }

        .post-card {
            display: block;
            text-decoration: none;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .post-card:last-child { border: none; }

        .post-card:hover {
            padding-left: 10px;
        }

        .post-title {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .post-card:hover .post-title {
            color: var(--accent);
        }

        .post-date {
            color: var(--text-dim);
            font-size: 0.8rem;
            font-family: monospace;
        }

        .loading {
            color: var(--accent);
            font-family: monospace;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        footer {
            padding: 40px 20px;
            text-align: center;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 5px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .accent-dot {
            color: var(--secondary);
        }
    </style>
</head>
<body>

<div id="mandatory-bot-banner" style="background-color: #0b0f19; color: #e2e8f0; text-align: center; padding: 12px 40px 12px 16px; font-size: 14px; font-family: system-ui, -apple-system, sans-serif; position: relative; width: 100%; box-sizing: border-box; z-index: 10000; border-bottom: 1px solid #1e293b; display: flex; justify-content: center; align-items: center; min-height: 48px; line-height: 1.5;">
    <span style="max-width: 800px; margin: 0 auto;">
        The design and code of this website are automatically generated and updated weekly by an LLM. 
        <a href="/prompt.txt" style="color: #38bdf8; text-decoration: none; font-weight: 500; white-space: nowrap; margin-left: 4px;">Read the prompt &rarr;</a>
    </span>
    <button onclick="document.getElementById('mandatory-bot-banner').remove()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #94a3b8; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;" onmouseover="this.style.color='#fff';this.style.backgroundColor='#334155';" onmouseout="this.style.color='#94a3b8';this.style.backgroundColor='#1e293b';">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
</div>

    <div class="grid-bg"></div>
    <div class="blob"></div>

    <main>
        <div class="hero-content">
            <h2>Senior Software Engineer @ Akaike</h2>
            <h1>Akshay<br>Thalinja<span class="accent-dot">.</span></h1>
            
            <div class="social-links">
                <a href="https://github.com/akstspace" target="_blank" class="social-link">GitHub</a>
                <a href="https://in.linkedin.com/in/akshay-t-b18b13172" target="_blank" class="social-link">LinkedIn</a>
                <a href="https://chaioverflow.substack.com" target="_blank" class="social-link">Blog</a>
            </div>
        </div>

        <div class="feed-section">
            <div id="blog-feed">
                <div class="loading">FETCHING_DATA...</div>
            </div>
        </div>
    </main>

    <footer>
        chaioverflow <span class="accent-dot">&copy;</span> <span id="year"></span>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        async function fetchPosts() {
            const feedContainer = document.getElementById('blog-feed');
            try {
                const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://chaioverflow.substack.com/feed');
                const data = await response.json();
                
                if (data.status === 'ok') {
                    feedContainer.innerHTML = '';
                    data.items.slice(0, 3).forEach(post => {
                        const date = new Date(post.pubDate).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'short',
                            day: 'numeric'
                        });
                        
                        const postElement = `
                            <a href="${post.link}" target="_blank" class="post-card">
                                <div class="post-title">${post.title}</div>
                                <div class="post-date">// ${date}</div>
                            </a>
                        `;
                        feedContainer.innerHTML += postElement;
                    });
                } else {
                    throw new Error();
                }
            } catch (error) {
                feedContainer.innerHTML = `
                    <div style="color: var(--secondary); font-size: 0.9rem;">
                        UNABLE TO SYNC FEED.<br><br>
                        <a href="https://chaioverflow.substack.com" target="_blank" style="color: var(--accent)">MANUAL_ACCESS_REQUIRED -></a>
                    </div>
                `;
            }
        }

        fetchPosts();
    </script>
</body>
</html>
