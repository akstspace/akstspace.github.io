<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Thalinja | Senior Software Engineer</title>
    <meta name="description" content="Akshay Thalinja — Senior Software Engineer at Akaike Technologies.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ff3e00;
            --text-main: #ffffff;
            --text-dim: #888888;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Abstract Background Decor */
        body::before {
            content: "";
            position: fixed;
            top: -10%;
            right: -10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(255, 62, 0, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(60px);
        }

        main {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 24px;
            width: 100%;
        }

        header {
            margin-bottom: 80px;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .role {
            font-size: 1.2rem;
            color: var(--text-dim);
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .role span {
            color: var(--accent);
        }

        nav {
            margin-top: 40px;
            display: flex;
            gap: 30px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            position: relative;
        }

        nav a::after {
            content: "";
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -5px;
            left: 0;
            background-color: var(--accent);
            transition: width 0.3s ease;
        }

        nav a:hover {
            color: var(--accent);
        }

        nav a:hover::after {
            width: 100%;
        }

        #blog-container {
            margin-top: 100px;
        }

        .section-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 40px;
        }

        .post-card {
            display: block;
            text-decoration: none;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            transition: transform 0.3s ease;
        }

        .post-card:hover {
            transform: translateX(10px);
        }

        .post-date {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: block;
        }

        .post-title {
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 500;
            font-family: 'Syne', sans-serif;
        }

        .loader {
            padding: 40px 0;
            color: var(--text-dim);
            font-style: italic;
        }

        .error-msg {
            background: var(--glass);
            padding: 20px;
            border-left: 3px solid var(--accent);
        }

        footer {
            padding: 40px 24px;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            header { margin-bottom: 40px; }
            #blog-container { margin-top: 60px; }
            nav { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div id="mandatory-bot-banner" style="background-color: #0b0f19; color: #e2e8f0; text-align: center; padding: 12px 40px 12px 16px; font-size: 14px; font-family: system-ui, -apple-system, sans-serif; position: relative; width: 100%; box-sizing: border-box; z-index: 10000; border-bottom: 1px solid #1e293b; display: flex; justify-content: center; align-items: center; min-height: 48px; line-height: 1.5;">
    <span style="max-width: 800px; margin: 0 auto;">
        The design and code of this website are automatically generated and updated weekly by an LLM. 
        <a href="/prompt.txt" style="color: #38bdf8; text-decoration: none; font-weight: 500; white-space: nowrap; margin-left: 4px;">Read the prompt &rarr;</a>
    </span>
    <button onclick="document.getElementById('mandatory-bot-banner').remove()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #94a3b8; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;" onmouseover="this.style.color='#fff';this.style.backgroundColor='#334155';" onmouseout="this.style.color='#94a3b8';this.style.backgroundColor='#1e293b';">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
</div>


    <main>
        <header>
            <h1>Akshay Thalinja</h1>
            <p class="role">Senior Software Engineer <span>@ Akaike</span></p>
            
            <nav>
                <a href="https://github.com/akstspace" target="_blank">GitHub</a>
                <a href="https://in.linkedin.com/in/akshay-t-b18b13172" target="_blank">LinkedIn</a>
                <a href="https://chaioverflow.substack.com" target="_blank">Blog</a>
            </nav>
        </header>

        <section id="blog-container">
            <span class="section-label">Latest Writing</span>
            <div id="feed">
                <div class="loader">Fetching latest entries...</div>
            </div>
        </section>
    </main>

    <footer>
        chaioverflow &copy; <span id="year"></span>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        async function fetchFeed() {
            const feedContainer = document.getElementById('feed');
            const url = 'https://api.rss2json.com/v1/api.json?rss_url=https://chaioverflow.substack.com/feed';

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                
                if (data.status === 'ok') {
                    feedContainer.innerHTML = '';
                    // Display top 3 posts
                    data.items.slice(0, 3).forEach(post => {
                        const date = new Date(post.pubDate).toLocaleDateString('en-US', {
                            month: 'short',
                            day: 'numeric',
                            year: 'numeric'
                        });
                        
                        const article = document.createElement('a');
                        article.className = 'post-card';
                        article.href = post.link;
                        article.target = '_blank';
                        article.innerHTML = `
                            <span class="post-date">${date}</span>
                            <div class="post-title">${post.title}</div>
                        `;
                        feedContainer.appendChild(article);
                    });
                } else {
                    throw new Error('Invalid data');
                }
            } catch (error) {
                feedContainer.innerHTML = `
                    <div class="error-msg">
                        Unable to load the feed right now. 
                        <br><br>
                        <a href="https://chaioverflow.substack.com" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: bold;">
                            Visit chaioverflow.substack.com &rarr;
                        </a>
                    </div>
                `;
            }
        }

        fetchFeed();
    </script>
</body>
</html>
