<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Thalinja | Senior Software Engineer</title>
    <meta name="description" content="Akshay Thalinja — Senior Software Engineer at Akaike Technologies.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --fg: #f5f5f5;
            --accent: #ff3e00;
            --surface: #1a1a1a;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Abstract Background Decor */
        body::before {
            content: "";
            position: fixed;
            top: -10%;
            right: -10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(255, 62, 0, 0.08) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
            flex-grow: 1;
        }

        header {
            margin-bottom: 6rem;
            position: relative;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 800;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .role-tag {
            font-size: 1.2rem;
            font-weight: 300;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            display: block;
            margin-bottom: 2rem;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }

        .nav-link {
            text-decoration: none;
            color: var(--fg);
            padding: 1.5rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.02);
        }

        .nav-link:hover {
            border-color: var(--accent);
            background: rgba(255, 62, 0, 0.05);
            transform: translateY(-2px);
        }

        .nav-link span {
            font-size: 0.8rem;
            opacity: 0.5;
        }

        section {
            margin-top: 4rem;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
        }

        .section-label::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: var(--border);
        }

        #blog-feed {
            display: grid;
            gap: 1.5rem;
        }

        .post-card {
            background: var(--surface);
            padding: 2rem;
            border-left: 2px solid var(--border);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
        }

        .post-card:hover {
            border-left-color: var(--accent);
            transform: translateX(10px);
            background: #222;
        }

        .post-title {
            font-size: 1.4rem;
            font-family: 'Syne', sans-serif;
            margin-bottom: 0.5rem;
            display: block;
        }

        .post-date {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            font-weight: 300;
        }

        .loading, .error-msg {
            padding: 2rem;
            text-align: center;
            background: var(--surface);
            border: 1px dashed var(--border);
        }

        .error-msg a {
            color: var(--accent);
            text-decoration: none;
        }

        footer {
            padding: 4rem 2rem;
            border-top: 1px solid var(--border);
            margin-top: 6rem;
        }

        .footer-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
        }

        .brand-logo {
            font-weight: 800;
            color: var(--fg);
            text-transform: lowercase;
            letter-spacing: -1px;
        }

        @media (max-width: 768px) {
            .container { padding: 2rem 1.5rem; }
            h1 { font-size: 3.5rem; }
            .nav-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="mandatory-bot-banner" style="background-color: #0b0f19; color: #e2e8f0; text-align: center; padding: 12px 40px 12px 16px; font-size: 14px; font-family: system-ui, -apple-system, sans-serif; position: relative; width: 100%; box-sizing: border-box; z-index: 10000; border-bottom: 1px solid #1e293b; display: flex; justify-content: center; align-items: center; min-height: 48px; line-height: 1.5;">
    <span style="max-width: 800px; margin: 0 auto;">
        The design and code of this website are automatically generated and updated weekly by an LLM. 
        <a href="/prompt.txt" style="color: #38bdf8; text-decoration: none; font-weight: 500; white-space: nowrap; margin-left: 4px;">Read the prompt &rarr;</a>
    </span>
    <button onclick="document.getElementById('mandatory-bot-banner').remove()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #94a3b8; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;" onmouseover="this.style.color='#fff';this.style.backgroundColor='#334155';" onmouseout="this.style.color='#94a3b8';this.style.backgroundColor='#1e293b';">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
</div>


    <div class="container">
        <header>
            <span class="role-tag">Senior Software Engineer @ Akaike</span>
            <h1>Akshay<br>Thalinja</h1>
            
            <nav class="nav-grid">
                <a href="https://github.com/akstspace" target="_blank" class="nav-link">
                    GitHub <span>/01</span>
                </a>
                <a href="https://in.linkedin.com/in/akshay-t-b18b13172" target="_blank" class="nav-link">
                    LinkedIn <span>/02</span>
                </a>
                <a href="https://chaioverflow.substack.com" target="_blank" class="nav-link">
                    Blog <span>/03</span>
                </a>
            </nav>
        </header>

        <section id="writing">
            <div class="section-label">Latest from chaioverflow</div>
            <div id="blog-feed">
                <div class="loading">Fetching transmissions...</div>
            </div>
        </section>
    </div>

    <footer>
        <div class="footer-content">
            <span class="brand-logo">chaioverflow</span>
            <span id="year"></span>
        </div>
    </footer>

    <script>
        // Set dynamic year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Fetch RSS Feed
        async function fetchPosts() {
            const feedContainer = document.getElementById('blog-feed');
            const rssUrl = 'https://api.rss2json.com/v1/api.json?rss_url=https://chaioverflow.substack.com/feed';

            try {
                const response = await fetch(rssUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                if (data.status === 'ok' && data.items.length > 0) {
                    feedContainer.innerHTML = '';
                    const items = data.items.slice(0, 3);
                    
                    items.forEach(post => {
                        const date = new Date(post.pubDate).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        });

                        const postElement = document.createElement('a');
                        postElement.href = post.link;
                        postElement.target = '_blank';
                        postElement.className = 'post-card';
                        postElement.innerHTML = `
                            <span class="post-title">${post.title}</span>
                            <span class="post-date">${date}</span>
                        `;
                        feedContainer.appendChild(postElement);
                    });
                } else {
                    throw new Error('No items found');
                }
            } catch (error) {
                feedContainer.innerHTML = `
                    <div class="error-msg">
                        Unable to load feed. <br>
                        <a href="https://chaioverflow.substack.com" target="_blank">Visit chaioverflow.substack.com directly &rarr;</a>
                    </div>
                `;
            }
        }

        fetchPosts();
    </script>
</body>
</html>
