<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Thalinja | Senior Software Engineer</title>
    <meta name="description" content="Akshay Thalinja — Senior Software Engineer at Akaike Technologies.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --accent: #00f2ff;
            --accent-soft: rgba(0, 242, 255, 0.15);
            --text-main: #e0e0e0;
            --text-dim: #888888;
            --font-display: 'Syncopate', sans-serif;
            --font-body: 'Space+Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Architectural Grid Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--accent-soft) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-soft) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            z-index: -2;
            mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
            opacity: 0.4;
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.1);
            z-index: -1;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem;
            position: relative;
        }

        /* Hero Section */
        header {
            padding: 6rem 0;
            border-bottom: 1px solid var(--accent-soft);
            position: relative;
        }

        .glitch-wrapper {
            position: relative;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: -2px;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 1rem;
            color: #fff;
        }

        .role-tag {
            display: inline-block;
            font-family: var(--font-mono);
            background: var(--accent);
            color: #000;
            padding: 4px 12px;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 2rem;
            transform: skewX(-15deg);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link:hover {
            color: var(--accent);
            transform: translateX(5px);
        }

        .nav-link::before {
            content: "//";
            color: var(--accent);
        }

        /* Blog Section */
        .section-label {
            font-family: var(--font-mono);
            color: var(--accent);
            font-size: 0.8rem;
            margin-top: 4rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-label::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: var(--accent-soft);
        }

        #blog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .blog-card {
            background: var(--surface);
            border: 1px solid #222;
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: block;
        }

        .blog-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 0;
            background: var(--accent);
            transition: height 0.3s ease;
        }

        .blog-card:hover {
            border-color: var(--accent-soft);
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .blog-card:hover::before {
            height: 100%;
        }

        .blog-date {
            font-family: var(--font-mono);
            color: var(--accent);
            font-size: 0.75rem;
            margin-bottom: 1rem;
            display: block;
        }

        .blog-title {
            font-family: var(--font-body);
            font-size: 1.25rem;
            color: white;
            font-weight: 500;
            line-height: 1.4;
        }

        .loader {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            font-family: var(--font-mono);
            color: var(--text-dim);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .error-state {
            grid-column: 1 / -1;
            border: 1px dashed #444;
            padding: 3rem;
            text-align: center;
        }

        /* Footer */
        footer {
            margin-top: 6rem;
            padding: 2rem 0;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .brand-logo {
            color: var(--text-main);
            font-weight: bold;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            main { padding: 2rem 1.5rem; }
            header { padding: 3rem 0; }
            .nav-links { flex-direction: column; gap: 1rem; }
            footer { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>
<body>

<div id="mandatory-bot-banner" style="background-color: #0b0f19; color: #e2e8f0; text-align: center; padding: 12px 40px 12px 16px; font-size: 14px; font-family: system-ui, -apple-system, sans-serif; position: relative; width: 100%; box-sizing: border-box; z-index: 10000; border-bottom: 1px solid #1e293b; display: flex; justify-content: center; align-items: center; min-height: 48px; line-height: 1.5;">
    <span style="max-width: 800px; margin: 0 auto;">
        The design and code of this website are automatically generated and updated weekly by an LLM. 
        <a href="/prompt.txt" style="color: #38bdf8; text-decoration: none; font-weight: 500; white-space: nowrap; margin-left: 4px;">Read the prompt &rarr;</a>
    </span>
    <button onclick="document.getElementById('mandatory-bot-banner').remove()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #94a3b8; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;" onmouseover="this.style.color='#fff';this.style.backgroundColor='#334155';" onmouseout="this.style.color='#94a3b8';this.style.backgroundColor='#1e293b';">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
</div>


    <div class="grid-bg"></div>
    <div class="scanline"></div>

    <main>
        <header>
            <div class="glitch-wrapper">
                <h1>Akshay<br>Thalinja</h1>
            </div>
            <div class="role-tag">Senior Software Engineer @ Akaike</div>
            
            <nav class="nav-links">
                <a href="https://github.com/akstspace" class="nav-link" target="_blank" rel="noopener">GitHub</a>
                <a href="https://in.linkedin.com/in/akshay-t-b18b13172" class="nav-link" target="_blank" rel="noopener">LinkedIn</a>
                <a href="https://blog.chaioverflow.com" class="nav-link" target="_blank" rel="noopener">Blog</a>
            </nav>
        </header>

        <div class="section-label">LATEST_LOGS</div>
        
        <section id="blog-container">
            <div class="loader">Fetching streams...</div>
        </section>

        <footer>
            <div class="brand-logo">chaioverflow</div>
            <div id="year-display"></div>
        </footer>
    </main>

    <script>
        // Dynamic Year
        document.getElementById('year-display').textContent = `© ${new Date().getFullYear()} TERMINAL_PORTFOLIO`;

        // Fetch Blog Posts
        const blogContainer = document.getElementById('blog-container');
        const RSS_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https://blog.chaioverflow.com/rss/';

        async function fetchPosts() {
            try {
                const response = await fetch(RSS_URL);
                const data = await response.json();

                if (data.status === 'ok') {
                    const posts = data.items.slice(0, 3);
                    blogContainer.innerHTML = '';
                    
                    posts.forEach(post => {
                        const date = new Date(post.pubDate).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'short',
                            day: 'numeric'
                        });

                        const card = document.createElement('a');
                        card.href = post.link;
                        card.target = '_blank';
                        card.className = 'blog-card';
                        card.innerHTML = `
                            <span class="blog-date">${date}</span>
                            <h3 class="blog-title">${post.title}</h3>
                        `;
                        blogContainer.appendChild(card);
                    });
                } else {
                    throw new Error('RSS conversion failed');
                }
            } catch (error) {
                blogContainer.innerHTML = `
                    <div class="error-state">
                        <p style="margin-bottom: 1rem; color: var(--text-dim);">Unable to retrieve blog feed.</p>
                        <a href="https://blog.chaioverflow.com" target="_blank" class="nav-link">Visit Direct Blog</a>
                    </div>
                `;
            }
        }

        fetchPosts();

        // Subtle Mouse parallax for the grid
        document.addEventListener('mousemove', (e) => {
            const grid = document.querySelector('.grid-bg');
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            grid.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
